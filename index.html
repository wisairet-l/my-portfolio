<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tara</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🌸 INTRO SCREEN -->
  <div class="intro" id="intro">
    <h1>Hi 🩷</h1>
    <p>A place where I share what I love ☕️</p>
  </div>

  <!-- 🌸 MAIN WEBSITE -->
  <div class="site" id="site">

    <!-- NAVBAR (فقط Home + Contact) -->
    <nav class="navbar">
      <div class="logo">Tara 🌸</div>

      <div class="links">
        <a href="#">Home</a>
        <a href="#">Contact</a>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <h1>Welcome 💖</h1>
      <p>A cozy little world made by me</p>

      <button onclick="explore()">✨ Explore</button>
    </section>

    <!-- INTERESTS -->
    <section class="interests">

      <h2>Interests</h2>

      <div class="grid">

        <div class="card">🍰 Anime</div>
        <div class="card">🎮 Games</div>
        <div class="card">🌿 Nature</div>
        <div class="card">🎵 Music</div>
        <div class="card">🎸 Guitar</div>

      </div>

    </section>

  </div>

  <script src="script.js"></script>
</body>

</html>
